name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "$OUTPUT" ./cmd/gitswitch
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}
            gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          merge-multiple: true

      - name: Create combined checksums file
        run: cat gitswitch-*.sha256 > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            gitswitch-darwin-amd64
            gitswitch-darwin-arm64
            gitswitch-linux-amd64
            gitswitch-linux-arm64
            checksums.txt
