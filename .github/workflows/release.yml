name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no code changed'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if internal/ or cmd/ changed
        id: check
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v -- '-' | head -n1)
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.inputs.force_release }}" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Force release requested"
            exit 0
          fi

          CHANGED=$(git diff "$LATEST_TAG"..HEAD --name-only -- internal/ cmd/ .goreleaser.yaml || true)
          if [ -z "$CHANGED" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes since $LATEST_TAG"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  skip:
    name: No code changes detected
    needs: check
    if: needs.check.outputs.should_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Only docs/config changed. No release needed."

  version:
    name: Compute next version
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.next_version.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next_version
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v -- '-' | head -n1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Always patch bump.
          # Add [minor] or [major] at the END of a commit subject to bump intentionally.
          # e.g. "feat: add OAuth support [minor]"
          COMMITS=$(git log "$LATEST"..HEAD --format="%s" 2>/dev/null || true)
          if echo "$COMMITS" | grep -qE '\[major\]$'; then
            NEW_TAG="v$((MAJOR + 1)).0.0"
          elif echo "$COMMITS" | grep -qE '\[minor\]$'; then
            NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

  release:
    name: Build and release
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.new_tag }}"
          git push origin "${{ needs.version.outputs.new_tag }}"

      - name: Prepare release notes
        run: |
          # Copy to temp so we don't dirty the working tree (goreleaser requires clean state).
          sed "s/^## v[0-9].*/## ${{ needs.version.outputs.new_tag }}/" CHANGELOG.md > /tmp/release-notes.md
          mkdir -p /tmp/gs-skill
          cp cmd/gitswitch/skill/SKILL.md /tmp/gs-skill/
          zip -j /tmp/gitswitch.skill /tmp/gs-skill/SKILL.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
          GORELEASER_CURRENT_TAG: ${{ needs.version.outputs.new_tag }}

      - name: Upload skill artifact to release
        run: |
          gh release upload "${{ needs.version.outputs.new_tag }}" /tmp/gitswitch.skill --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-website:
    name: Rebuild gitswitch.dev
    needs: [version, release]
    runs-on: ubuntu-latest
    if: success()
    continue-on-error: true

    steps:
      - name: Trigger website rebuild
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aksisonline/gitswitch-web-v3/dispatches \
            -d '{"event_type":"gitswitch-release","client_payload":{"version":"${{ needs.version.outputs.new_tag }}"}}'

  notify-website-manual:
    name: Rebuild gitswitch.dev (manual)
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && needs.check.outputs.should_release == 'false'
    continue-on-error: true

    steps:
      - name: Trigger website rebuild with latest tag
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aksisonline/gitswitch-web-v3/dispatches \
            -d '{"event_type":"gitswitch-release","client_payload":{"version":"${{ needs.check.outputs.latest_tag }}"}}'
