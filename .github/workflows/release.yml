name: Build, Release, and Update Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if internal/ or cmd/ changed
        id: check
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No tags yet, will release"
            exit 0
          fi

          # Check if internal/ or cmd/ changed
          CHANGED=$(git diff $LATEST_TAG..HEAD --name-only -- internal/ cmd/ || true)

          if [ -z "$CHANGED" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No changes in internal/ or cmd/ since $LATEST_TAG, skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected, proceeding with release:"
            echo "$CHANGED"
          fi

  skip:
    name: No code changes detected
    needs: check
    if: needs.check.outputs.should_release == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Skip notification
        run: echo "✓ Only docs/config changed. No release needed."

  version:
    name: Compute next version
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.next_version.outputs.new_tag }}
      version: ${{ steps.next_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: next_version
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          NEXT_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"

  build:
    name: Build binaries
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ needs.version.outputs.new_tag }}" -o "$OUTPUT" ./cmd/gitswitch
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}
            gitswitch-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  publish:
    name: Create release and tag
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "gitswitch-*" -o -name "*.sha256" \) -exec mv {} release/ \;
          cd release
          cat gitswitch-*.sha256 > checksums.txt 2>/dev/null || echo "No checksums"
          ls -la

      - name: Update install script with version
        run: |
          sed -i "s/LATEST_VERSION/${{ needs.version.outputs.new_tag }}/g" .github/install.sh

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/install.sh
          git commit -m "chore: update install script for ${{ needs.version.outputs.new_tag }}" || true
          git tag "${{ needs.version.outputs.new_tag }}"
          git push origin main
          git push origin "${{ needs.version.outputs.new_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    needs: [version, publish]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout homebrew-gitswitch
        uses: actions/checkout@v4
        with:
          repository: aksisonline/homebrew-gitswitch
          token: ${{ secrets.HOMEBREW_PAT }}

      - name: Download checksums
        run: |
          curl -sL "https://github.com/aksisonline/gitswitch/releases/download/${{ needs.version.outputs.new_tag }}/checksums.txt" -o checksums.txt
          cat checksums.txt

      - name: Update formula with checksums
        run: |
          AMD64=$(grep gitswitch-darwin-amd64 checksums.txt | awk '{print $1}')
          ARM64=$(grep gitswitch-darwin-arm64 checksums.txt | awk '{print $1}')
          LINUX_AMD64=$(grep gitswitch-linux-amd64 checksums.txt | awk '{print $1}')
          LINUX_ARM64=$(grep gitswitch-linux-arm64 checksums.txt | awk '{print $1}')

          sed -i "s/version = .*/version = \"${{ needs.version.outputs.version }}\"/" Formula/gitswitch.rb
          sed -i "s/REPLACE_WITH_AMD64_SHA256/$AMD64/" Formula/gitswitch.rb
          sed -i "s/REPLACE_WITH_ARM64_SHA256/$ARM64/" Formula/gitswitch.rb
          sed -i "s/REPLACE_WITH_LINUX_AMD64_SHA256/$LINUX_AMD64/" Formula/gitswitch.rb
          sed -i "s/REPLACE_WITH_LINUX_ARM64_SHA256/$LINUX_ARM64/" Formula/gitswitch.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitswitch.rb
          git commit -m "chore: update formula for ${{ needs.version.outputs.new_tag }}"
          git push
