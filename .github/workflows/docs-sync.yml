name: Rebuild website on docs change

# Docs are the source of truth here (docs/public/**). The website
# (gitswitch.dev) fetches them at build time, so any docs edit pushed to main
# should rebuild and redeploy the site. Code releases already trigger the site
# via release.yml — this covers docs-only pushes that don't cut a release.

on:
  push:
    branches: [main]
    paths:
      - 'docs/public/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-website:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aksisonline/gitswitch-web-v3/dispatches \
            -d '{"event_type":"gitswitch-release","client_payload":{"reason":"docs"}}'
